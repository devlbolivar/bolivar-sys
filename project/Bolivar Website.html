/* ── HELPERS ────────────────────────────────────── */
function FadeIn({ children, delay=0, style={} }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVis(true); obs.disconnect(); }
    }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? 'translateY(0)' : 'translateY(22px)',
      transition: `opacity .65s ${delay}s ease, transform .65s ${delay}s ease`,
      ...style,
    }}>{children}</div>
  );
}

function SectionLabel({ children }) {
  return <p style={{...mono, fontSize:11, color:A, letterSpacing:3, marginBottom:14}}>{children}</p>;
}

function SectionHead({ label, title }) {

        <h2 style={{...grot, fontSize:48, fontWeight:700, letterSpacing:'-1.5px', color:'#E8F4F8', textWrap:'pretty'}}>{title}</h2>
      </div>
    </FadeIn>
  );
}

/* ── SCROLL PROGRESS ────────────────────────────── */
function ScrollProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      const tot = el.scrollHeight - el.clientHeight;
      setPct(tot > 0 ? (el.scrollTop / tot) * 100 : 0);
    };
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <div style={{ position:'fixed', top:0, left:0, right:0, height:2, zIndex:200, background:Am(0.07) }}>
      <div style={{ height:'100%', width:`${pct}%`, background:`linear-gradient(90deg,${Am(0)},${A})`, transition:'width .08s' }}/>
    </div>
  );
}
