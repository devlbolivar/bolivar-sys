    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }

    .sel-bar {
      position:fixed; top:0; left:0; right:0; z-index:9999;
      background:#090909; border-bottom:1px solid #1c1c1c;
      display:flex; align-items:center; gap:5px; padding:9px 18px;
      overflow-x:auto; scrollbar-width:none;

<script type="text/babel">

/* ─────────────── P1 NOIR PREMIUM ─────────────── */

  {id:'terminal', label:'Terminal Dev',  dot:'#10B981', C:P6},
];

function App(){
  const [idx,setIdx] = useState(()=>{
    const n=parseInt(localStorage.getItem('bolivar-prop')||'0',10);
    return isNaN(n)?0:Math.min(n,5);
  });
  useEffect(()=>{ localStorage.setItem('bolivar-prop',String(idx)); },[idx]);
  const {C} = PROPS[idx];
  return (
    <>
      <div className="sel-bar">
        <span className="sel-lbl">PROPUESTA:</span>
        {PROPS.map((p,i)=>(
          <button key={p.id} className={`sel-btn${idx===i?' on':''}`} onClick={()=>setIdx(i)}>
            <span className="dot" style={{background:p.dot}}/>
            {String(i+1).padStart(2,'0')} {p.label}
          </button>
        ))}
      </div>
      <div className="pv"><C/></div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
